[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = False
exclude = (?x)(
    tests/
    | migrations/
    | debug/
  )

# Flask-SQLAlchemy models use db.Model which mypy can't resolve without a plugin
[mypy-app.models.*]
ignore_errors = True

# Route files are mostly untyped Flask view functions
[mypy-app.routes.*]
ignore_errors = True
