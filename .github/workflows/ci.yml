name: CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest + data validation + type checking
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # -------------------------
      # Unit Tests
      # -------------------------
      - name: Run pytest
        working-directory: backend
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-secret-key-minimum-length
          SECRET_KEY: ci-test-secret-key-minimum-length
        run: python -m pytest tests/ -q --tb=short

      # -------------------------
      # Data Validation
      # -------------------------
      - name: Validate game data
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-minimum-length
          JWT_SECRET_KEY: ci-test-secret-key-minimum-length
        run: flask validate-data

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript + ESLint + Build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # -------------------------
      # Type Safety
      # -------------------------
      - name: TypeScript type-check
        working-directory: frontend
        run: npm run type-check

      # -------------------------
      # Linting
      # -------------------------
      - name: ESLint
        working-directory: frontend
        run: npm run lint

      # -------------------------
      # Production Build (catches bundler errors, dead imports, etc.)
      # -------------------------
      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker — verify images build successfully
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only run on pushes to main (not on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: the-forge-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: the-forge-frontend:ci
          build-args: |
            APP_VERSION=${{ github.sha }}
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
