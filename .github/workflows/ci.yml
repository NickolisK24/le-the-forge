name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        id: pytest
        working-directory: backend
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-secret-key-minimum-length
          SECRET_KEY: ci-test-secret-key-minimum-length
        run: |
          set -o pipefail
          python -m pytest tests/ -x -q | tee pytest-output.txt
          PASSED=$(grep -oE '[0-9]+ passed' pytest-output.txt | tail -1 | awk '{print $1}' || echo 0)
          FAILED=$(grep -oE '[0-9]+ failed' pytest-output.txt | tail -1 | awk '{print $1}' || echo 0)
          echo "passed=${PASSED:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED:-0}" >> "$GITHUB_OUTPUT"

      - name: Publish test count
        if: always()
        run: |
          echo "### Backend tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- passed: ${{ steps.pytest.outputs.passed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- failed: ${{ steps.pytest.outputs.failed }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript type-check
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Data — validate static JSON assets
  # ---------------------------------------------------------------------------
  data-validate:
    name: Data Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Validate game data
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-minimum-length
          JWT_SECRET_KEY: ci-test-secret-key-minimum-length
        run: flask validate-data
