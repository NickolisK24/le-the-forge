
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: the_forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forgedev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d the_forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://forge:${DB_PASSWORD:-forgedev}@db:5432/the_forge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_IMPORT_WEBHOOK_URL: ${DISCORD_IMPORT_WEBHOOK_URL}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5050:5000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - backend_venv:/venv
    command: sh -c "flask db upgrade && flask seed && flask seed-passives && flask run --host=0.0.0.0 --port=5000 --debug"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5050/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./backend/src/constants:/backend/src/constants:ro
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  frontend_node_modules:
  backend_venv:
